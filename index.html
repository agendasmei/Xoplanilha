<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff;
  color: #000;
}

header {
  background: #f4b400;
  padding: 15px;
  font-weight: bold;
}

nav {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-bottom: 2px solid #000;
}

nav button {
  padding: 10px;
  border: none;
  cursor: pointer;
  background: #000;
  color: #fff;
}

section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

.box {
  border: 2px solid #000;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

.tag {
  display: inline-block;
  padding: 5px;
  background: #f4b400;
  margin-left: 5px;
}
</style>
</head>

<body>

<header>💰 Controle Financeiro</header>

<nav>
  <button onclick="mostrar('dashboard')">Dashboard</button>
  <button onclick="mostrar('fluxo')">Fluxo</button>
  <button onclick="mostrar('caixinhas')">Caixinhas</button>
  <button onclick="mostrar('metas')">Metas</button>
  <button onclick="mostrar('investimentos')">Investimentos</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboard" class="active">
  <div class="box">
    <h2>📊 Resumo</h2>
    <p id="resumo"></p>
  </div>
</section>

<!-- FLUXO -->
<section id="fluxo">
  <div class="box">
    <h2>💰 Entradas</h2>
    <input id="entrada" type="number" placeholder="Digite valor">
    <button onclick="addEntrada()">Adicionar</button>
  </div>

  <div class="box">
    <h2>💸 Gastei no Dinheiro/Pix</h2>
    <input id="saida" type="number" placeholder="Valor gasto">
    <button onclick="addSaida()">Adicionar</button>
  </div>

  <div class="box">
    <h2>💳 Passei no Cartão</h2>
    <input id="cartao" type="number" placeholder="Valor no cartão">
    <button onclick="addCartao()">Adicionar</button>
    <p id="fatura"></p>
    <button onclick="pagarFatura()">Pagar Fatura</button>
  </div>
</section>

<!-- CAIXINHAS -->
<section id="caixinhas">
  <div class="box">
    <h2>📦 Método das Caixinhas</h2>
    <p id="caixinhasInfo"></p>
  </div>
</section>

<!-- METAS -->
<section id="metas">
  <div class="box">
    <h2>🚀 Metas</h2>
    <input id="metaValor" type="number" placeholder="Valor da meta">
    <input id="metaTempo" type="number" placeholder="Dias">
    <button onclick="criarMeta()">Criar</button>
    <p id="metaResultado"></p>
  </div>
</section>

<!-- INVESTIMENTOS -->
<section id="investimentos">
  <div class="box">
    <h2>📈 Investimentos</h2>
    <input id="invest" type="number" placeholder="Valor investido">
    <button onclick="addInvest()">Adicionar</button>
    <p id="totalInvest"></p>
  </div>
</section>

<script>
let entradas = [];
let saidas = [];
let cartao = [];
let investimentos = [];

function mostrar(sec) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(sec).classList.add("active");
}

function addEntrada() {
  let v = Number(document.getElementById("entrada").value);
  entradas.push(v);
  atualizar();
}

function addSaida() {
  let v = Number(document.getElementById("saida").value);
  saidas.push(v);
  atualizar();
}

function addCartao() {
  let v = Number(document.getElementById("cartao").value);
  cartao.push(v);
  atualizar();
}

function pagarFatura() {
  let total = cartao.reduce((a,b)=>a+b,0);
  saidas.push(total);
  cartao = [];
  atualizar();
}

function addInvest() {
  let v = Number(document.getElementById("invest").value);
  investimentos.push(v);
  atualizar();
}

function criarMeta() {
  let valor = Number(document.getElementById("metaValor").value);
  let dias = Number(document.getElementById("metaTempo").value);

  let porDia = valor / dias;

  document.getElementById("metaResultado").innerText =
    "Você precisa guardar R$ " + porDia.toFixed(2) + " por dia";
}

function atualizar() {
  let totalEntrada = entradas.reduce((a,b)=>a+b,0);
  let totalSaida = saidas.reduce((a,b)=>a+b,0);
  let totalCartao = cartao.reduce((a,b)=>a+b,0);

  let saldo = totalEntrada - totalSaida - totalCartao;

  document.getElementById("resumo").innerText =
    "Entradas: R$ " + totalEntrada +
    " | Saídas: R$ " + totalSaida +
    " | Cartão: R$ " + totalCartao +
    " | Saldo Real: R$ " + saldo;

  document.getElementById("fatura").innerText =
    "Fatura atual: R$ " + totalCartao;

  let investTotal = investimentos.reduce((a,b)=>a+b,0);
  document.getElementById("totalInvest").innerText =
    "Total investido: R$ " + investTotal;

  // Caixinhas simples
  document.getElementById("caixinhasInfo").innerText =
    "Essencial: 50% | Investimento: 10% | Educação: 10% | Sonhos: 10% | Doação: 10% | Lazer: 10%";
}
</script>

</body>
</html>
