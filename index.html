<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance AI</title>

<link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
  💰 Finance AI
  <span id="alerta"></span>
</header>

<nav>
  <button onclick="mostrar('dashboard')">Dashboard</button>
  <button onclick="mostrar('fluxo')">Fluxo</button>
  <button onclick="mostrar('caixinhas')">Caixinhas</button>
</nav>

<section id="dashboard" class="active">
  <div class="card destaque">
    <h2>Saldo</h2>
    <p id="saldo">R$ 0</p>
  </div>

  <div class="card">
    <h3>Resumo</h3>
    <p id="resumo"></p>
  </div>
</section>

<section id="fluxo">

  <div class="card">
    <h3>Renda Fixa</h3>
    <input id="fixa" type="number" placeholder="Ex: 3000">
    <button onclick="salvarFixa()">Salvar</button>
  </div>

  <div class="card">
    <h3>Renda Variável</h3>
    <input id="var" type="number" placeholder="Ex: 200">
    <button onclick="addVar()">Adicionar</button>
  </div>

  <div class="card">
    <h3>Nova Despesa</h3>

    <input id="nome" placeholder="Ex: Aluguel">
    <input id="valor" type="number" placeholder="Valor">

    <select id="caixa">
      <option>Essencial</option>
      <option>Investimento</option>
      <option>Educação</option>
      <option>Sonhos</option>
      <option>Doação</option>
      <option>Lazer</option>
    </select>

    <button onclick="addDespesa()">Adicionar</button>

    <div id="lista"></div>
  </div>

</section>

<section id="caixinhas">
  <div class="card">
    <h3>Distribuição Inteligente</h3>
    <div id="caixinhasView"></div>
  </div>
</section>

<script src="./script.js"></script>

</body>
</html>
