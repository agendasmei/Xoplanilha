<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeuDinheiro</title>

<link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="topo">
  <div class="logo">💰</div>
  <h2>MeuDinheiro</h2>
</header>

<!-- DASHBOARD -->
<section id="dashboard" class="active">

<h2>Abril 2026</h2>

<div class="grid">

  <div class="card verde">
    <p>Renda Total</p>
    <h3 id="rendaTotal">R$ 0</h3>
  </div>

  <div class="card vermelho">
    <p>Gastos</p>
    <h3 id="gastos">R$ 0</h3>
  </div>

  <div class="card">
    <p>Fixos</p>
    <h3 id="fixos">R$ 0</h3>
  </div>

  <div class="card verde">
    <p>Sobra</p>
    <h3 id="sobra">R$ 0</h3>
  </div>

</div>

<div class="card">
  <h3>💰 Renda Mensal</h3>

  <label>Salário</label>
  <input id="fixa" type="number">

  <label>Renda Extra</label>
  <input id="extra" type="number">

  <button onclick="salvarRenda()">Salvar</button>
</div>

</section>

<!-- DESPESAS -->
<section id="despesas">

<div class="card">
  <h3>💸 Nova Despesa</h3>

  <input id="nome" placeholder="Ex: Aluguel">
  <input id="valor" type="number">

  <select id="tipo">
    <option>Fixo</option>
    <option>Variável</option>
  </select>

  <select id="caixa">
    <option>Essencial</option>
    <option>Lazer</option>
    <option>Investimento</option>
  </select>

  <button onclick="addDespesa()">Adicionar</button>
</div>

<div class="card" id="lista"></div>

</section>

<!-- MENU -->
<nav class="menu">
  <button onclick="trocar('dashboard')">🏠</button>
  <button onclick="trocar('despesas')">💳</button>
</nav>

<script src="./script.js"></script>

</body>
</html>
