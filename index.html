<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff;
  color: #000;
}

header {
  background: #f4b400;
  padding: 15px;
  font-weight: bold;
}

nav {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-bottom: 2px solid #000;
}

nav button {
  padding: 10px;
  border: none;
  cursor: pointer;
  background: #000;
  color: #fff;
}

section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

.box {
  border: 2px solid #000;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, select {
  padding: 8px;
  margin: 5px;
}

button {
  background: #f4b400;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>💰 Controle Financeiro</header>

<nav>
  <button onclick="mostrar('dashboard')">Dashboard</button>
  <button onclick="mostrar('fluxo')">Fluxo</button>
  <button onclick="mostrar('caixinhas')">Caixinhas</button>
  <button onclick="mostrar('metas')">Metas</button>
  <button onclick="mostrar('investimentos')">Investimentos</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboard" class="active">
  <div class="box">
    <h2>📊 Resumo</h2>
    <p id="resumo"></p>
  </div>
</section>

<!-- FLUXO -->
<section id="fluxo">

  <div class="box">
    <h2>💰 Entradas</h2>

    <h3>Renda Fixa</h3>
    <input id="rendaFixa" type="number" placeholder="Quanto ganha no mês">
    <button onclick="salvarFixa()">Salvar</button>

    <h3>Renda Variável</h3>
    <input id="rendaVar" type="number" placeholder="Valor recebido">
    <button onclick="addVariavel()">Adicionar</button>

    <p id="listaVar"></p>
  </div>

  <div class="box">
    <h2>💸 Despesas</h2>

    <input id="nomeDespesa" placeholder="Nome (ex: aluguel)">
    <input id="valorDespesa" type="number" placeholder="Valor">

    <select id="categoria">
      <option>Moradia</option>
      <option>Alimentação</option>
      <option>Transporte</option>
      <option>Lazer</option>
    </select>

    <select id="caixinha">
      <option>Essencial</option>
      <option>Investimento</option>
      <option>Educação</option>
      <option>Sonhos</option>
      <option>Doação</option>
      <option>Lazer</option>
    </select>

    <button onclick="addDespesa()">Adicionar</button>

    <p id="listaDespesas"></p>
  </div>

  <div class="box">
    <h2>💳 Cartão de Crédito</h2>

    <input id="cartao" type="number" placeholder="Valor no cartão">
    <button onclick="addCartao()">Adicionar</button>

    <p id="fatura"></p>
    <button onclick="pagarFatura()">Pagar Fatura</button>
  </div>

</section>

<!-- CAIXINHAS -->
<section id="caixinhas">
  <div class="box">
    <h2>📦 Método das Caixinhas</h2>
    <p id="caixinhasInfo"></p>
  </div>
</section>

<!-- METAS -->
<section id="metas">
  <div class="box">
    <h2>🚀 Metas</h2>

    <input id="metaValor" type="number" placeholder="Valor da meta">
    <input id="metaTempo" type="number" placeholder="Dias">

    <button onclick="criarMeta()">Criar</button>

    <p id="metaResultado"></p>
  </div>
</section>

<!-- INVESTIMENTOS -->
<section id="investimentos">
  <div class="box">
    <h2>📈 Investimentos</h2>

    <input id="invest" type="number" placeholder="Valor investido">
    <button onclick="addInvest()">Adicionar</button>

    <p id="totalInvest"></p>
  </div>
</section>

<script>
let rendaFixa = 0;
let rendaVariavel = [];
let despesas = [];
let cartao = [];
let investimentos = [];

let caixinhas = {
  Essencial: 0,
  Investimento: 0,
  Educação: 0,
  Sonhos: 0,
  Doação: 0,
  Lazer: 0
};

function mostrar(sec) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(sec).classList.add("active");
}

function salvarFixa() {
  rendaFixa = Number(document.getElementById("rendaFixa").value);
  atualizar();
}

function addVariavel() {
  let v = Number(document.getElementById("rendaVar").value);
  rendaVariavel.push(v);

  document.getElementById("listaVar").innerText =
    "Total variável: R$ " + rendaVariavel.reduce((a,b)=>a+b,0);

  atualizar();
}

function addDespesa() {
  let nome = document.getElementById("nomeDespesa").value;
  let valor = Number(document.getElementById("valorDespesa").value);
  let caixinha = document.getElementById("caixinha").value;

  despesas.push({nome, valor, caixinha});
  caixinhas[caixinha] += valor;

  document.getElementById("listaDespesas").innerText =
    despesas.map(d => d.nome + " - R$ " + d.valor + " (" + d.caixinha + ")").join("\n");

  atualizar();
}

function addCartao() {
  let v = Number(document.getElementById("cartao").value);
  cartao.push(v);
  atualizar();
}

function pagarFatura() {
  let total = cartao.reduce((a,b)=>a+b,0);
  despesas.push({nome:"Fatura Cartão", valor:total, caixinha:"Essencial"});
  caixinhas["Essencial"] += total;
  cartao = [];
  atualizar();
}

function addInvest() {
  let v = Number(document.getElementById("invest").value);
  investimentos.push(v);
  atualizar();
}

function criarMeta() {
  let valor = Number(document.getElementById("metaValor").value);
  let dias = Number(document.getElementById("metaTempo").value);

  let porDia = valor / dias;

  document.getElementById("metaResultado").innerText =
    "Guardar R$ " + porDia.toFixed(2) + " por dia";
}

function atualizar() {
  let totalVar = rendaVariavel.reduce((a,b)=>a+b,0);
  let totalEntradas = rendaFixa + totalVar;

  let totalDespesas = despesas.reduce((a,b)=>a+b.valor,0);
  let totalCartao = cartao.reduce((a,b)=>a+b,0);

  let saldo = totalEntradas - totalDespesas - totalCartao;

  document.getElementById("resumo").innerText =
    "Entradas: R$ " + totalEntradas +
    " | Despesas: R$ " + totalDespesas +
    " | Cartão: R$ " + totalCartao +
    " | Saldo: R$ " + saldo;

  document.getElementById("fatura").innerText =
    "Fatura atual: R$ " + totalCartao;

  let investTotal = investimentos.reduce((a,b)=>a+b,0);
  document.getElementById("totalInvest").innerText =
    "Total investido: R$ " + investTotal;

  document.getElementById("caixinhasInfo").innerText =
    Object.entries(caixinhas)
      .map(([k,v]) => k + ": R$ " + v)
      .join(" | ");
}
</script>

</body>
</html>
